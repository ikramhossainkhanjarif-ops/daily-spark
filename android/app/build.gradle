plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.dailyspark.app"
    compileSdk = 34
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId = "com.dailyspark.app"
        // SCHEDULE_EXACT_ALARM / setAlarmClock, full-screen intents on
        // lock screen, and POST_NOTIFICATIONS all assume API 26+.
        minSdk = 26
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: replace with your own signing config before a real
            // release build; debug signing is fine for sideloading /
            // testing on your own device.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
